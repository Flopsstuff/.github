<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- LED glow — blur behind source gives bloom effect -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Housing -->
  <rect width="200" height="200" rx="18" fill="#0c0c0c"/>
  <!-- Subtle inner bezel -->
  <rect x="5" y="5" width="190" height="190" rx="14" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!--
    7-segment cells — authentic proportions with italic skew
    ─────────────────────────────────────────────────────────
    Cell:     68 × 127 px
    Segment:  T=13  bevel=9  gap=3
    v-arm:    38 px inner

    Segment y positions (oy=37):
      a  top horiz   37 – 50
      f/b verticals  53 – 91
      g  mid horiz   94 – 107
      e/c verticals  110 – 148
      d  bot horiz   151 – 164

    Cell F: ox=47   Cell S: ox=127
    skewX(-12) for italic lean (applied to whole group)
  -->

  <g transform="skewX(-12)">

    <!-- ══════════════  F  ══════════════ -->

    <!-- dim (off) segments -->
    <g fill="#210606">
      <!-- b  top-right vertical -->
      <polygon points="108.5,53 115,62 115,82 108.5,91 102,82 102,62"/>
      <!-- c  bottom-right vertical -->
      <polygon points="108.5,110 115,119 115,139 108.5,148 102,139 102,119"/>
      <!-- d  bottom horizontal -->
      <polygon points="56,151 106,151 115,157.5 106,164 56,164 47,157.5"/>
    </g>

    <!-- lit (on) segments -->
    <g fill="#e20e0e" filter="url(#glow)">
      <!-- a  top horizontal -->
      <polygon points="56,37 106,37 115,43.5 106,50 56,50 47,43.5"/>
      <!-- f  top-left vertical -->
      <polygon points="53.5,53 60,62 60,82 53.5,91 47,82 47,62"/>
      <!-- g  middle horizontal -->
      <polygon points="56,94 106,94 115,100.5 106,107 56,107 47,100.5"/>
      <!-- e  bottom-left vertical -->
      <polygon points="53.5,110 60,119 60,139 53.5,148 47,139 47,119"/>
    </g>

    <!-- ══════════════  S  ══════════════ -->

    <!-- dim (off) segments -->
    <g fill="#210606">
      <!-- e  bottom-left vertical -->
      <polygon points="133.5,110 140,119 140,139 133.5,148 127,139 127,119"/>
    </g>

    <!-- lit (on) segments -->
    <g fill="#e20e0e" filter="url(#glow)">
      <!-- a  top horizontal -->
      <polygon points="136,37 186,37 195,43.5 186,50 136,50 127,43.5"/>
      <!-- f  top-left vertical -->
      <polygon points="133.5,53 140,62 140,82 133.5,91 127,82 127,62"/>
      <!-- b  top-right vertical -->
      <polygon points="188.5,53 195,62 195,82 188.5,91 182,82 182,62"/>
      <!-- g  middle horizontal -->
      <polygon points="136,94 186,94 195,100.5 186,107 136,107 127,100.5"/>
      <!-- c  bottom-right vertical -->
      <polygon points="188.5,110 195,119 195,139 188.5,148 182,139 182,119"/>
      <!-- d  bottom horizontal -->
      <polygon points="136,151 186,151 195,157.5 186,164 136,164 127,157.5"/>
    </g>

  </g>
</svg>
