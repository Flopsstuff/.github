<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">

  <!-- Dark square background -->
  <rect width="200" height="200" rx="20" ry="20" fill="#0d0d0d"/>

  <!--
    7-segment layout — two cells side by side
    Cell size: 64 x 126 px  |  seg_thick=10  bevel=5  gap=2  v_len=44
    Cell F: ox=30, oy=37    Cell S: ox=106, oy=37
    Active: #dd1111   Inactive (off): #2d0808
  -->

  <!-- ═══════ LETTER F  (segments: a f g e — top, top-left, mid, bot-left) ═══════ -->

  <!-- inactive: b top-right vertical -->
  <polygon points="89,49 94,54 94,88 89,93 84,88 84,54" fill="#2d0808"/>
  <!-- inactive: c bottom-right vertical -->
  <polygon points="89,107 94,112 94,146 89,151 84,146 84,112" fill="#2d0808"/>
  <!-- inactive: d bottom horizontal -->
  <polygon points="35,153 89,153 94,158 89,163 35,163 30,158" fill="#2d0808"/>

  <!-- a  top horizontal -->
  <polygon points="35,37 89,37 94,42 89,47 35,47 30,42" fill="#dd1111"/>
  <!-- f  top-left vertical -->
  <polygon points="35,49 40,54 40,88 35,93 30,88 30,54" fill="#dd1111"/>
  <!-- g  middle horizontal -->
  <polygon points="35,95 89,95 94,100 89,105 35,105 30,100" fill="#dd1111"/>
  <!-- e  bottom-left vertical -->
  <polygon points="35,107 40,112 40,146 35,151 30,146 30,112" fill="#dd1111"/>

  <!-- ═══════ LETTER S  (segments: a b c d f g — all except e bottom-left) ═══════ -->

  <!-- inactive: e bottom-left vertical -->
  <polygon points="111,107 116,112 116,146 111,151 106,146 106,112" fill="#2d0808"/>

  <!-- a  top horizontal -->
  <polygon points="111,37 165,37 170,42 165,47 111,47 106,42" fill="#dd1111"/>
  <!-- f  top-left vertical -->
  <polygon points="111,49 116,54 116,88 111,93 106,88 106,54" fill="#dd1111"/>
  <!-- b  top-right vertical -->
  <polygon points="165,49 170,54 170,88 165,93 160,88 160,54" fill="#dd1111"/>
  <!-- g  middle horizontal -->
  <polygon points="111,95 165,95 170,100 165,105 111,105 106,100" fill="#dd1111"/>
  <!-- c  bottom-right vertical -->
  <polygon points="165,107 170,112 170,146 165,151 160,146 160,112" fill="#dd1111"/>
  <!-- d  bottom horizontal -->
  <polygon points="111,153 165,153 170,158 165,163 111,163 106,158" fill="#dd1111"/>

</svg>
