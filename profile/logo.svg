<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">

  <!-- Housing -->
  <rect width="200" height="200" rx="18" fill="#0c0c0c"/>
  <!-- Subtle inner bezel -->
  <rect x="5" y="5" width="190" height="190" rx="14" fill="none" stroke="#1c1c1c" stroke-width="1.5"/>

  <!--
    7-segment cells — italic lean, no blur filter (crisp on all renderers)
    ───────────────────────────────────────────────────────────────────────
    T=13  bevel=9  gap=4  v-arm=36  cell=68×127
    Segment y positions (oy=37):
      a  top horiz   37–50
      f/b verticals  54–90
      g  mid horiz   94–107
      e/c verticals  111–147
      d  bot horiz   151–164
    Cell F: ox=47   Cell S: ox=127
    skewX(-12) — italic lean
  -->

  <g transform="skewX(-12)">

    <!-- ═══════  F  ═══════ -->
    <!-- off -->
    <g fill="#2c0808">
      <!-- b top-right  --> <polygon points="108.5,54 115,63 115,81 108.5,90 102,81 102,63"/>
      <!-- c bot-right  --> <polygon points="108.5,111 115,120 115,138 108.5,147 102,138 102,120"/>
      <!-- d bottom     --> <polygon points="56,151 106,151 115,157.5 106,164 56,164 47,157.5"/>
    </g>
    <!-- on -->
    <g fill="#e01010">
      <!-- a top        --> <polygon points="56,37 106,37 115,43.5 106,50 56,50 47,43.5"/>
      <!-- f top-left   --> <polygon points="53.5,54 60,63 60,81 53.5,90 47,81 47,63"/>
      <!-- g middle     --> <polygon points="56,94 106,94 115,100.5 106,107 56,107 47,100.5"/>
      <!-- e bot-left   --> <polygon points="53.5,111 60,120 60,138 53.5,147 47,138 47,120"/>
    </g>

    <!-- ═══════  S  ═══════ -->
    <!-- off -->
    <g fill="#2c0808">
      <!-- e bot-left   --> <polygon points="133.5,111 140,120 140,138 133.5,147 127,138 127,120"/>
    </g>
    <!-- on -->
    <g fill="#e01010">
      <!-- a top        --> <polygon points="136,37 186,37 195,43.5 186,50 136,50 127,43.5"/>
      <!-- f top-left   --> <polygon points="133.5,54 140,63 140,81 133.5,90 127,81 127,63"/>
      <!-- b top-right  --> <polygon points="188.5,54 195,63 195,81 188.5,90 182,81 182,63"/>
      <!-- g middle     --> <polygon points="136,94 186,94 195,100.5 186,107 136,107 127,100.5"/>
      <!-- c bot-right  --> <polygon points="188.5,111 195,120 195,138 188.5,147 182,138 182,120"/>
      <!-- d bottom     --> <polygon points="136,151 186,151 195,157.5 186,164 136,164 127,157.5"/>
    </g>

  </g>
</svg>
